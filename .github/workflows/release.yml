name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated release tag to resume
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    environment: npm
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: source
    steps:
      - name: Check out release automation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: .release-automation
          persist-credentials: false
      - name: Check out the release tag and LFS assets
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: source
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Install pinned pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.21.0
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - name: Verify LFS object integrity
        run: git lfs fsck
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium system dependencies
        run: pnpm exec playwright install --with-deps chromium
      - name: Run the complete release gate
        run: pnpm run ci:verify
      - name: Pack and verify the release candidate
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="$RUNNER_TEMP/forge-candidate"
          mkdir -p "$candidate_dir"
          pnpm pack --pack-destination "$candidate_dir"
          mapfile -t tarballs < <(find "$candidate_dir" -maxdepth 1 -type f -name '*.tgz' -print)
          test "${#tarballs[@]}" -eq 1
          pnpm run release:verify "$RELEASE_TAG" "${tarballs[0]}"
          echo "tarball=${tarballs[0]}" >> "$GITHUB_OUTPUT"
      - name: Publish candidate and resolve canonical registry artifact
        id: registry
        env:
          NPM_CONFIG_PROVENANCE: "true"
          CANDIDATE: ${{ steps.candidate.outputs.tarball }}
        shell: bash
        run: |
          set -euo pipefail
          package_spec="$(node -p "const p=require('./package.json'); p.name+'@'+p.version")"
          if ! pnpm view "$package_spec" version >/dev/null 2>&1; then
            pnpm publish "$CANDIDATE" --access public --no-git-checks
          fi

          registry_dir="$RUNNER_TEMP/forge-registry"
          metadata="$registry_dir/dist.json"
          tarball="$registry_dir/$(basename "$CANDIDATE")"
          mkdir -p "$registry_dir"
          for attempt in {1..12}; do
            if pnpm view "$package_spec" dist --json > "$metadata"; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              exit 1
            fi
            sleep 5
          done
          node ../.release-automation/scripts/download-registry-artifact.mjs "$metadata" "$tarball"
          node ../.release-automation/scripts/verify-release-artifacts.mjs "$CANDIDATE" "$tarball"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "checksum=$tarball.sha256" >> "$GITHUB_OUTPUT"
      - name: Attest the canonical registry artifact
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: ${{ steps.registry.outputs.tarball }}
      - name: Create or update the draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.registry.outputs.tarball }}
          CHECKSUM: ${{ steps.registry.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail
          release_metadata="$RUNNER_TEMP/forge-github-release.json"
          if gh release view "$RELEASE_TAG" --json assets > "$release_metadata" 2>/dev/null; then
            if node ../.release-automation/scripts/verify-github-release-assets.mjs \
              "$release_metadata" "$TARBALL" "$CHECKSUM"; then
              echo "Canonical GitHub Release assets already exist; skipping upload."
            else
              status="$?"
              test "$status" -eq 10
              gh release upload "$RELEASE_TAG" "$TARBALL" "$CHECKSUM" --clobber
            fi
          else
            gh release create "$RELEASE_TAG" "$TARBALL" "$CHECKSUM" \
              --draft --verify-tag --generate-notes --title "$RELEASE_TAG"
          fi
      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --draft=false --latest
